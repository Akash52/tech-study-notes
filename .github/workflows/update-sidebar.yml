name: Update Sidebar

on:
  push:
    branches: [main]
    paths:
      - 'docs/**.md'

jobs:
  update-sidebar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate sidebar
        run: |
          cd docs

          title_from_first_line() {
            # Only treat "# Title" as a real H1 if it's the file's first substantive
            # line, skipping leading blank lines and stray "---" dividers. Guards
            # against matching a "# ..." comment buried in a later code fence.
            awk '
              NF==0 { next }
              /^-{3,}$/ { next }
              { if ($0 ~ /^# /) { sub(/^# +/, ""); print; } exit }
            ' "$1"
          }

          title_from_filename() {
            base=$(basename "$1" .md)
            base=$(echo "$base" | sed -E 's/^[0-9]+_//')
            echo "$base" | sed -E 's/[_-]+/ /g' | sed -E 's/(^| )([a-z])/\1\U\2/g'
          }

          link_title() {
            t=$(title_from_first_line "$1")
            if [ -z "$t" ]; then t=$(title_from_filename "$1"); fi
            echo "$t"
          }

          folder_title() {
            echo "$1" | sed -E 's/[_-]+/ /g' | sed -E 's/(^| )([a-z])/\1\U\2/g'
          }

          out="_sidebar.md"
          {
            echo "- **Notes**"
            echo "  - [Home](/)"
            echo ""

            # top-level docs/*.md (excluding README/sidebar) stay under Notes
            for file in $(find . -maxdepth 1 -name "*.md" ! -name "README.md" ! -iname "_sidebar.md" | sort); do
              t=$(link_title "$file")
              path=$(echo "$file" | sed -E 's|^\./||; s/\.md$//')
              echo "  - [$t](/$path)"
            done
            echo ""

            # each top-level directory under docs/ becomes its own category
            for dir in $(find . -mindepth 1 -maxdepth 1 -type d | sort); do
              dname=$(basename "$dir")
              echo "- **$(folder_title "$dname")**"

              for file in $(find "$dir" -maxdepth 1 -name "*.md" | sort); do
                t=$(link_title "$file")
                path=$(echo "$file" | sed -E 's|^\./||; s/\.md$//')
                echo "  - [$t]($path)"
              done

              # one level of subfolders becomes a nested sub-list
              for subdir in $(find "$dir" -mindepth 1 -maxdepth 1 -type d | sort); do
                sname=$(basename "$subdir")
                echo "  - **$(folder_title "$sname")**"
                for file in $(find "$subdir" -maxdepth 1 -name "*.md" | sort); do
                  t=$(link_title "$file")
                  path=$(echo "$file" | sed -E 's|^\./||; s/\.md$//')
                  echo "    - [$t]($path)"
                done
              done
              echo ""
            done
          } > "$out"

      - name: Commit sidebar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/_sidebar.md
          git diff --staged --quiet || git commit -m "docs: auto-update sidebar"
          git push
